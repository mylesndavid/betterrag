// ── Filter noise ──
const NOISE_ENTITIES = new Set([
  "onmicrosoft onmicrosoft", "web info", "info worker", "worker skipping",
  "paused web", "whitney", "year", "interested", "job", "upload", "user",
  "insurance"
]);
const NOISE_PERSONS = new Set(["Bronsexual", "Mdavid6"]);

const noiseIds = new Set();
RAW.nodes.forEach(n => {
  if (n.type === "entity" && NOISE_ENTITIES.has(n.name)) noiseIds.add(n.id);
  if (n.type === "person" && NOISE_PERSONS.has(n.name)) noiseIds.add(n.id);
  if (n.type === "person" && n.clusters === 0) noiseIds.add(n.id);
});

const nodes = RAW.nodes.filter(n => !noiseIds.has(n.id));
const nodeIds = new Set(nodes.map(n => n.id));
const edges = RAW.edges.filter(e =>
  nodeIds.has(e.source) && nodeIds.has(e.target) &&
  !(e.type === "TOPIC" && e.weight < 10)
);

// ── Stats ──
const personCount = nodes.filter(n => n.type === "person").length;
const entityCount = nodes.filter(n => n.type === "entity").length;
const interactsCount = edges.filter(e => e.type === "INTERACTS").length;
const topicCount = edges.filter(e => e.type === "TOPIC").length;
document.getElementById("stats").textContent = `${personCount} people · ${entityCount} topics · ${interactsCount + topicCount} connections`;

// ── Build simulation nodes ──
const nodeMap = new Map();
const simNodes = nodes.map((n, i) => {
  let radius;
  if (n.type === "person") {
    radius = Math.max(6, Math.min(32, 4 + Math.sqrt(n.clusters) * 1.5));
  } else {
    radius = Math.max(3, Math.min(14, 2 + Math.sqrt(n.freq) * 1.4));
  }
  const sn = {
    id: n.id, type: n.type, name: n.name, radius,
    clusters: n.clusters, freq: n.freq,
    x: (Math.random() - 0.5) * 600,
    y: (Math.random() - 0.5) * 600,
    vx: 0, vy: 0,
    pinned: false
  };
  nodeMap.set(n.id, sn);
  return sn;
});

const simEdges = edges.map(e => ({
  source: nodeMap.get(e.source),
  target: nodeMap.get(e.target),
  type: e.type,
  weight: e.weight
}));

// Build adjacency for hover highlighting
const adjacency = new Map();
simNodes.forEach(n => adjacency.set(n, new Set()));
simEdges.forEach(e => {
  adjacency.get(e.source).add(e.target);
  adjacency.get(e.target).add(e.source);
});

// ── Canvas setup ──
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener("resize", resize);

// ── Camera ──
let camX = 0, camY = 0, camZoom = 1;

function screenToWorld(sx, sy) {
  return { x: (sx - W / 2) / camZoom + camX, y: (sy - H / 2) / camZoom + camY };
}
function worldToScreen(wx, wy) {
  return { x: (wx - camX) * camZoom + W / 2, y: (wy - camY) * camZoom + H / 2 };
}

// ── Force simulation ──
const ALPHA_DECAY = 0.0008;
const VELOCITY_DECAY = 0.55;
let alpha = 1;

function tick() {
  alpha = Math.max(0.001, alpha - ALPHA_DECAY);

  // Repulsion (Barnes-Hut would be overkill for <100 nodes)
  for (let i = 0; i < simNodes.length; i++) {
    const a = simNodes[i];
    for (let j = i + 1; j < simNodes.length; j++) {
      const b = simNodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let d2 = dx * dx + dy * dy;
      if (d2 < 1) { dx = Math.random() - 0.5; dy = Math.random() - 0.5; d2 = 1; }
      const d = Math.sqrt(d2);

      // Stronger repulsion between people
      let strength;
      if (a.type === "person" && b.type === "person") {
        strength = 2800;
      } else if (a.type === "entity" && b.type === "entity") {
        strength = 400;
      } else {
        strength = 800;
      }

      const f = alpha * strength / d2;
      const fx = dx / d * f, fy = dy / d * f;
      if (!a.pinned) { a.vx -= fx; a.vy -= fy; }
      if (!b.pinned) { b.vx += fx; b.vy += fy; }
    }
  }

  // Attraction (edges)
  for (const e of simEdges) {
    const dx = e.target.x - e.source.x;
    const dy = e.target.y - e.source.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;

    let idealLen, strength;
    if (e.type === "INTERACTS") {
      idealLen = 120 - Math.min(60, Math.sqrt(e.weight) * 5);
      strength = 0.06 * Math.min(1, Math.sqrt(e.weight) / 4);
    } else {
      idealLen = 200;
      strength = 0.008;
    }

    const displacement = d - idealLen;
    const f = alpha * displacement * strength;
    const fx = dx / d * f, fy = dy / d * f;
    if (!e.source.pinned) { e.source.vx += fx; e.source.vy += fy; }
    if (!e.target.pinned) { e.target.vx -= fx; e.target.vy -= fy; }
  }

  // Center gravity (gentle)
  for (const n of simNodes) {
    if (!n.pinned) {
      n.vx -= n.x * alpha * 0.005;
      n.vy -= n.y * alpha * 0.005;
    }
  }

  // Integrate
  for (const n of simNodes) {
    if (n.pinned) { n.vx = 0; n.vy = 0; continue; }
    n.vx *= VELOCITY_DECAY;
    n.vy *= VELOCITY_DECAY;
    n.x += n.vx;
    n.y += n.vy;
  }
}

// ── Interaction state ──
let hoveredNode = null;
let draggedNode = null;
let isPanning = false;
let panStartX, panStartY, panCamStartX, panCamStartY;
let mouseX = -9999, mouseY = -9999;

function hitTest(sx, sy) {
  const w = screenToWorld(sx, sy);
  let best = null, bestD = Infinity;
  for (const n of simNodes) {
    const dx = n.x - w.x, dy = n.y - w.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    const hitRadius = n.radius / camZoom + n.radius;
    if (d < hitRadius && d < bestD) { best = n; bestD = d; }
  }
  return best;
}

canvas.addEventListener("mousedown", e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    draggedNode = hit;
    alpha = Math.max(alpha, 0.3);
    canvas.classList.add("dragging");
  } else {
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panCamStartX = camX; panCamStartY = camY;
    canvas.classList.add("dragging");
  }
});

canvas.addEventListener("mousemove", e => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (draggedNode) {
    const w = screenToWorld(e.clientX, e.clientY);
    draggedNode.x = w.x; draggedNode.y = w.y;
    draggedNode.vx = 0; draggedNode.vy = 0;
    alpha = Math.max(alpha, 0.1);
  } else if (isPanning) {
    const dx = (e.clientX - panStartX) / camZoom;
    const dy = (e.clientY - panStartY) / camZoom;
    camX = panCamStartX - dx;
    camY = panCamStartY - dy;
  } else {
    const hit = hitTest(e.clientX, e.clientY);
    hoveredNode = hit;
    canvas.style.cursor = hit ? "pointer" : "grab";
  }
});

canvas.addEventListener("mouseup", e => {
  if (draggedNode && !isPanning) {
    // Check if it was a click (no significant drag)
    const w = screenToWorld(e.clientX, e.clientY);
    const dx = draggedNode.x - w.x, dy = draggedNode.y - w.y;
    if (Math.sqrt(dx*dx+dy*dy) < 2) {
      draggedNode.pinned = !draggedNode.pinned;
    }
  }
  draggedNode = null;
  isPanning = false;
  canvas.classList.remove("dragging");
});

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  const newZoom = Math.max(0.1, Math.min(8, camZoom * factor));
  // Zoom toward mouse position
  const wx = (e.clientX - W / 2) / camZoom + camX;
  const wy = (e.clientY - H / 2) / camZoom + camY;
  camZoom = newZoom;
  camX = wx - (e.clientX - W / 2) / camZoom;
  camY = wy - (e.clientY - H / 2) / camZoom;
}, { passive: false });

// ── Tooltip ──
const tooltip = document.getElementById("tooltip");
const ttName = tooltip.querySelector(".tt-name");
const ttType = tooltip.querySelector(".tt-type");
const ttDetail = tooltip.querySelector(".tt-detail");

function updateTooltip() {
  if (hoveredNode && !draggedNode) {
    const n = hoveredNode;
    ttName.textContent = n.name;
    ttType.textContent = n.type === "person" ? "Person" : "Topic";
    if (n.type === "person") {
      const connEdges = simEdges.filter(e => e.type === "INTERACTS" && (e.source === n || e.target === n));
      const totalWeight = connEdges.reduce((s, e) => s + e.weight, 0);
      ttName.style.color = "#5bbbf5";
      ttDetail.textContent = `${n.clusters} conversations · ${connEdges.length} connections · ${totalWeight} interactions`;
    } else {
      const connEdges = simEdges.filter(e => e.type === "TOPIC" && (e.source === n || e.target === n));
      ttName.style.color = "#f0a050";
      ttDetail.textContent = `Frequency: ${n.freq} · ${connEdges.length} people discuss this`;
    }
    tooltip.style.display = "block";
    let tx = mouseX + 16, ty = mouseY + 16;
    if (tx + 240 > W) tx = mouseX - 256;
    if (ty + 100 > H) ty = mouseY - 100;
    tooltip.style.left = tx + "px";
    tooltip.style.top = ty + "px";
  } else {
    tooltip.style.display = "none";
  }
}

// ── Rendering ──
const maxInteractWeight = Math.max(...simEdges.filter(e => e.type === "INTERACTS").map(e => e.weight));

function draw() {
  ctx.save();
  ctx.clearRect(0, 0, W, H);

  // Subtle radial gradient background
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  bgGrad.addColorStop(0, "#0e0e18");
  bgGrad.addColorStop(1, "#0a0a0f");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Apply camera
  ctx.translate(W / 2, H / 2);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-camX, -camY);

  const isHovering = hoveredNode && !draggedNode;
  const hoverSet = isHovering ? adjacency.get(hoveredNode) : null;

  // ── Draw edges ──
  for (const e of simEdges) {
    const isHighlighted = isHovering && (e.source === hoveredNode || e.target === hoveredNode);
    const isDimmed = isHovering && !isHighlighted;

    if (e.type === "TOPIC") {
      if (isDimmed) ctx.globalAlpha = 0.02;
      else if (isHighlighted) ctx.globalAlpha = 0.4;
      else ctx.globalAlpha = 0.08;
      ctx.strokeStyle = "#f0a050";
      ctx.lineWidth = 0.5;
    } else {
      const wNorm = e.weight / maxInteractWeight;
      const thickness = 0.8 + wNorm * 6;
      if (isDimmed) ctx.globalAlpha = 0.04;
      else if (isHighlighted) ctx.globalAlpha = 0.9;
      else ctx.globalAlpha = 0.15 + wNorm * 0.45;
      ctx.lineWidth = thickness;

      if (isHighlighted) {
        ctx.strokeStyle = "#7cb8ff";
      } else {
        ctx.strokeStyle = `rgba(140, 180, 255, 1)`;
      }
    }

    ctx.beginPath();
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // ── Draw nodes ──
  for (const n of simNodes) {
    const isHovered = n === hoveredNode;
    const isConnected = isHovering && hoverSet && hoverSet.has(n);
    const isDimmed = isHovering && !isHovered && !isConnected;

    const r = n.radius;

    if (isDimmed) ctx.globalAlpha = 0.12;
    else ctx.globalAlpha = 1;

    if (n.type === "person") {
      // Glow
      const glowSize = isHovered ? r * 3.5 : r * 2.2;
      const glow = ctx.createRadialGradient(n.x, n.y, r * 0.3, n.x, n.y, glowSize);
      if (isHovered) {
        glow.addColorStop(0, "rgba(90, 180, 255, 0.35)");
        glow.addColorStop(0.5, "rgba(60, 140, 255, 0.12)");
        glow.addColorStop(1, "rgba(40, 100, 255, 0)");
      } else {
        glow.addColorStop(0, "rgba(74, 158, 255, 0.2)");
        glow.addColorStop(0.5, "rgba(60, 130, 255, 0.06)");
        glow.addColorStop(1, "rgba(40, 100, 255, 0)");
      }
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowSize, 0, Math.PI * 2);
      ctx.fill();

      // Node body
      const grad = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, r * 0.1, n.x, n.y, r);
      grad.addColorStop(0, isHovered ? "#8ecfff" : "#5bbbf5");
      grad.addColorStop(0.7, isHovered ? "#4a9eff" : "#3a7ed8");
      grad.addColorStop(1, isHovered ? "#2670cc" : "#2255a0");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fill();

      // Pin indicator
      if (n.pinned) {
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r + 3, 0, Math.PI * 2);
        ctx.stroke();
      }
    } else {
      // Entity glow
      const glowSize = isHovered ? r * 4 : r * 2.5;
      const glow = ctx.createRadialGradient(n.x, n.y, r * 0.2, n.x, n.y, glowSize);
      if (isHovered) {
        glow.addColorStop(0, "rgba(240, 170, 80, 0.3)");
        glow.addColorStop(1, "rgba(240, 140, 50, 0)");
      } else {
        glow.addColorStop(0, "rgba(240, 160, 80, 0.15)");
        glow.addColorStop(1, "rgba(240, 140, 50, 0)");
      }
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowSize, 0, Math.PI * 2);
      ctx.fill();

      // Entity body
      const grad = ctx.createRadialGradient(n.x - r * 0.2, n.y - r * 0.2, r * 0.1, n.x, n.y, r);
      grad.addColorStop(0, isHovered ? "#ffc870" : "#f0a050");
      grad.addColorStop(1, isHovered ? "#e08830" : "#c07030");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fill();

      if (n.pinned) {
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r + 2, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // ── Labels ──
    if (!isDimmed) {
      const fontSize = n.type === "person" ? Math.max(10, Math.min(14, r * 0.8)) : Math.max(8, Math.min(11, r * 1.2));
      ctx.font = `${n.type === "person" ? 500 : 400} ${fontSize}px -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      const labelY = n.y + r + 4;
      const text = n.name;

      // Text shadow for readability
      ctx.fillStyle = "rgba(10, 10, 15, 0.85)";
      ctx.fillText(text, n.x + 1, labelY + 1);

      if (n.type === "person") {
        ctx.fillStyle = isHovered ? "#c8e4ff" : "rgba(160, 190, 230, 0.8)";
      } else {
        ctx.fillStyle = isHovered ? "#ffe0b0" : "rgba(200, 170, 130, 0.65)";
      }
      ctx.fillText(text, n.x, labelY);
    }

    ctx.globalAlpha = 1;
  }

  ctx.restore();

  updateTooltip();
}

// ── Animation loop ──
function frame() {
  tick();
  draw();
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
